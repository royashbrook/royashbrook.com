name: deploy

# build the astro site + ship it to cloudflare workers (static assets) on every push to main.
# infra/** has its own workflow (tofu/dns), so skip changes that only touch it.
# also runs daily: the build reads the `royashbrook-tool` github topic, so a newly-tagged tool shows
# up on /projects + /agents + /llms.txt within a day even with no push.
# needs repo secret CLOUDFLARE_API_TOKEN (an "Edit Cloudflare Workers" token; distinct from the
# zone-scoped TF_CLOUDFLARE_API_TOKEN). account id is in wrangler.jsonc (not a secret).
on:
  push:
    branches: [main]
    paths-ignore: ["infra/**"]
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:
  # the craftrush game repo dispatches this on its own push-to-main so a game update redeploys the
  # site (which re-pulls craftrush) immediately, not on the next site push / the daily cron.
  repository_dispatch:
    types: [craftrush-update]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - name: deploy to cloudflare
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
